<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marquee — a movie recommender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="lobby">

  <header class="marquee">
    <div class="bulbs" aria-hidden="true"></div>
    <h1 class="marquee-title">MARQUEE</h1>
    <p class="marquee-sub">tell me a film you love — I'll book your next one</p>
    <div class="bulbs bulbs-bottom" aria-hidden="true"></div>
  </header>

  <main class="screen">
    <div class="ticket-window">
      <input
        id="chat-input"
        type="text"
        placeholder="e.g. Toy Story, The Matrix, Inception..."
        autocomplete="off"
      />
      <button id="send-btn" aria-label="Ask for a recommendation">Ask</button>
    </div>
    <ul id="autocomplete" class="autocomplete" hidden></ul>

    <div id="feed" class="feed">
      <div class="usher-line">
        <span class="usher-badge">USHER</span>
        <p id="greeting-text">Loading tonight's greeting…</p>
      </div>
    </div>
  </main>

  <footer class="reel-footer">
    <div class="sprockets" aria-hidden="true"></div>
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
